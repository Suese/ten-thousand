<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10,000 — Dice</title>

    <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.160.0",
        "cannon-es": "https://esm.sh/cannon-es@0.20.0",
        "peerjs": "https://esm.sh/peerjs@1.5.4"
      }
    }
    </script>
    <script type="module" crossorigin src="./assets/index-CDHPOQ5F.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-B3KiOJSe.css">
  </head>
  <body>
    <div id="canvas-root"></div>
    <button id="mute-btn" title="Mute / unmute">🔊</button>
    <button id="shop-btn" class="hidden" title="Open shop">🛒 Shop</button>

    <div id="shop-modal" class="overlay hidden">
      <div class="panel shop-panel">
        <div class="shop-header">
          <h2>🛒 Shop</h2>
          <div class="shop-balance">
            Your bank: <span id="shop-balance">0</span>
          </div>
          <button id="shop-close">✕</button>
        </div>
        <p class="tag">Spend banked points on chaos.</p>
        <div id="shop-grid"></div>
      </div>
    </div>

    <div id="inventory" class="hidden"></div>

    <div id="reticle" class="hidden">
      <div class="ring"></div>
      <div class="dot"></div>
      <div class="hint"></div>
    </div>

    <div id="lobby" class="overlay">
      <div class="panel">
        <h1>10,000</h1>
        <p class="tag">A multiplayer dice game</p>

        <label>
          Your name
          <input id="name-input" type="text" maxlength="16" placeholder="Player" />
        </label>

        <div class="row">
          <button id="host-btn" class="primary">Host a game</button>
        </div>

        <div class="divider"><span>or</span></div>

        <label>
          Room link or code
          <input id="join-code" type="text" maxlength="500" placeholder="https://… or abc-123-xyz" />
        </label>
        <div class="row">
          <button id="join-btn">Join game</button>
        </div>

        <div id="lobby-status" class="status"></div>
      </div>
    </div>

    <div id="waiting" class="overlay hidden">
      <div class="panel">
        <h2>Waiting room</h2>
        <p>Share this link — friends can join any time, even mid-game:</p>
        <div class="code-box">
          <code id="room-code"></code>
          <button id="copy-code">Copy link</button>
        </div>
        <h3>Players</h3>
        <ul id="player-list"></ul>
        <div class="row" id="host-controls">
          <button id="start-btn" class="primary">Start game</button>
        </div>
        <p class="tag" id="waiting-tag"></p>
      </div>
    </div>

    <div id="game-ui" class="hidden">
      <div id="scoreboard"></div>
      <div id="turn-banner"></div>
      <div id="action-bar">
        <div id="selection-info"></div>
        <div class="actions">
          <button id="roll-btn">Roll</button>
          <button id="keep-btn">Keep selected &amp; roll again</button>
          <button id="bank-btn">Bank points</button>
        </div>
      </div>
      <div id="log"></div>
    </div>

    <div id="end-screen" class="overlay hidden">
      <div class="panel">
        <h1 id="end-title">Game over</h1>
        <ul id="final-scores"></ul>
        <div class="row">
          <button id="play-again-btn" class="primary">Back to lobby</button>
        </div>
      </div>
    </div>

  </body>
</html>
